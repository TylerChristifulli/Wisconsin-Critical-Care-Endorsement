let filterCat = "all";
function shortName(key) {
  return CATEGORIES[key].name.split(":")[0].split(",")[0];
}
function buildPills() {
  const el = document.getElementById("pills");
  const counts = {};
  Object.keys(CATEGORIES).forEach(k => counts[k] = 0);
  COURSES.forEach(c => c.wicc.forEach(w => counts[w]++));
  let html = '<button class="pill" onclick="setFilter(\'all\')" id="pill-all" style="background:' + (filterCat==='all'?'#f8fafc':'#334155') + ';color:' + (filterCat==='all'?'#0f172a':'#94a3b8') + '">All (' + COURSES.length + ')</button>';
  Object.entries(CATEGORIES).forEach(function([key, cat]) {
    if (key === "none") return;
    var active = filterCat === key;
    html += '<button class="pill" onclick="setFilter(\'' + key + '\')" id="pill-' + key + '" style="background:' + (active?cat.color:'#334155') + ';color:' + (active?'#fff':'#94a3b8') + '">' + shortName(key) + ' (' + counts[key] + ')</button>';
  });
  var noneActive = filterCat === "none";
  html += '<button class="pill" onclick="setFilter(\'none\')" id="pill-none" style="background:' + (noneActive?'#6b7280':'#334155') + ';color:' + (noneActive?'#fff':'#94a3b8') + '">No match (' + counts.none + ')</button>';
  el.innerHTML = html;
}
function setFilter(cat) {
  filterCat = (filterCat === cat) ? "all" : cat;
  render();
}
function render() {
  var q = document.getElementById("search").value.toLowerCase().trim();
  var filtered = COURSES;
  if (q) { var words = q.split(/\s+/); filtered = filtered.filter(function(c) { var hay = (c.name + " " + c.studio).toLowerCase(); return words.every(function(w) { return hay.includes(w); }); }); }
  if (filterCat !== "all") filtered = filtered.filter(function(c) { return c.wicc.includes(filterCat); });
  filtered.sort(function(a, b) { return a.name.localeCompare(b.name); });
  buildPills();
  document.getElementById("count").textContent = filtered.length + ' course' + (filtered.length !== 1 ? 's' : '') + ' found';
  var el = document.getElementById("results");
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">\ud83d\udd0d</div><div style="font-size:15px">No courses match your search</div><div style="font-size:13px;margin-top:4px">Try a different keyword</div></div>';
    return;
  }
  el.innerHTML = filtered.map(function(c) {
    var borderColor = CATEGORIES[c.wicc[0]].color;
    var tags = c.wicc.map(function(w) {
      var cat = CATEGORIES[w];
      return '<span class="tag" style="background:' + cat.color + '22;color:' + cat.color + ';border:1px solid ' + cat.color + '44">' + shortName(w) + '</span>';
    }).join("");
    var hrs = c.hours === 1 ? "1 hr" : c.hours + " hrs";
    return '<div class="card" style="border-left-color:' + borderColor + '"><div class="card-header"><div><div class="card-title">' + esc(c.name) + '</div><div class="card-studio">' + esc(c.studio) + '</div></div><span class="card-hours">' + hrs + '</span></div><div class="tags">' + tags + '</div></div>';
  }).join("");
}
function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
render();
