<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WICC Course Matcher — FOAMfrat Studio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; background: #0f172a; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
  .container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }
  h1 { font-size: 24px; font-weight: 700; color: #f8fafc; text-align: center; }
  .subtitle { font-size: 14px; color: #94a3b8; text-align: center; margin-top: 4px; }
  .search { width: 100%; padding: 12px 16px; font-size: 16px; border-radius: 10px; border: 2px solid #334155; background: #1e293b; color: #f8fafc; outline: none; margin-bottom: 16px; }
  .search:focus { border-color: #6366f1; }
  .pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .pill { padding: 6px 12px; border-radius: 20px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .pill:hover { opacity: 0.85; }
  .count { font-size: 13px; color: #64748b; margin-bottom: 12px; }
  .results { display: flex; flex-direction: column; gap: 8px; }
  .card { background: #1e293b; border-radius: 10px; padding: 14px 16px; border-left: 4px solid #6b7280; }
  .card-title { font-size: 15px; font-weight: 600; color: #f1f5f9; }
  .card-studio { font-size: 12px; color: #64748b; margin-top: 2px; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .tag { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .empty { text-align: center; padding: 40px; color: #475569; }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }
  .footer { text-align: center; margin-top: 32px; padding: 16px 0; border-top: 1px solid #1e293b; font-size: 11px; color: #475569; }
</style>
</head>
<body>
<div class="container">
  <div style="text-align:center;margin-bottom:24px">
    <h1>WICC Course Matcher</h1>
    <p class="subtitle">Search FOAMfrat Studio courses to find their WICC renewal category</p>
  </div>
  <input class="search" type="text" id="search" placeholder="Type a course name... (e.g. vasopressors, ECMO, lab)" oninput="render()">
  <div class="pills" id="pills"></div>
  <p class="count" id="count"></p>
  <div class="results" id="results"></div>
  <div class="footer">WICC F-01955 | 2026–2029 Renewal | 24 total hours required<br>Always verify CE hours against your actual course completion certificates</div>
</div>
<script>
const CATEGORIES = {
  cpr:            { name: "CPR",                                              hours: "Varies", color: "#ef4444" },
  diagnostics:    { name: "Diagnostic Studies: Lab Interpretation, Radiology", hours: "3.0",   color: "#f59e0b" },
  vascular:       { name: "Vascular Access, Fluid and Blood Administration",  hours: "3.0",   color: "#10b981" },
  pharmacology:   { name: "Pharmacology",                                     hours: "6.0",   color: "#6366f1" },
  cardiovascular: { name: "Cardiovascular System",                            hours: "3.0",   color: "#ec4899" },
  respiratory:    { name: "Respiratory System",                               hours: "3.0",   color: "#0ea5e9" },
  sepsis:         { name: "Sepsis and Multiple Organ Dysfunction Syndrome",   hours: "6.0",   color: "#8b5cf6" },

const COURSES = [
  // Scan Artist Files
  { name: "Scan Artist: Images From Sound (S1E1)", studio: "Scan Artist Files", wicc: ["diagnostics"] },
  { name: "Scan Artist: The Probe (S1E2)", studio: "Scan Artist Files", wicc: ["diagnostics"] },
  { name: "Scan Artist: Lung Sliding & Pneumothorax (S1E3)", studio: "Scan Artist Files", wicc: ["diagnostics", "respiratory"] },
  { name: "Scan Artist: Is This Tachycardia Compensatory (S1E4)", studio: "Scan Artist Files", wicc: ["diagnostics", "cardiovascular"] },
  { name: "Scan Artist: Ultrasound & The FAST Exam (S1E5)", studio: "Scan Artist Files", wicc: ["diagnostics"] },

  // Airway/Respiratory/Ventilation
  { name: "Understanding COPD", studio: "Airway/Resp/Vent", wicc: ["respiratory"] },
  { name: "The Advanced Airway Course", studio: "Airway/Resp/Vent", wicc: ["respiratory"] },

  { name: "OPA/NPA", studio: "Airway/Resp/Vent", wicc: ["none"] },

  { name: "Airway Podcasts", studio: "Airway/Resp/Vent", wicc: ["respiratory"] },

  // Cardiovascular
  { name: "Cardiac Monitoring Waveforms", studio: "Cardiovascular", wicc: ["diagnostics", "cardiovascular"] },
  { name: "Understanding CPR", studio: "Cardiovascular", wicc: ["cpr"] },
  { name: "Is This Tachycardia Compensatory?", studio: "Cardiovascular", wicc: ["cardiovascular"] },
  { name: "ECG Basics", studio: "Cardiovascular", wicc: ["diagnostics", "cardiovascular"] },
  { name: "Cardiac Anatomy", studio: "Cardiovascular", wicc: ["cardiovascular"] },

  // Trauma
  { name: "Blood Transfusion and Resuscitation", studio: "Trauma", wicc: ["vascular"] },
  { name: "Ultrasound & The FAST Exam", studio: "Trauma", wicc: ["diagnostics"] },
  { name: "Gut Instinct: Abdominal Trauma", studio: "Trauma", wicc: ["none"] },

  { name: "Cage Match: Thoracic Trauma", studio: "Trauma", wicc: ["none"] },

  // Medical
  { name: "Animated Guide to Disseminated Intravascular Coagulation", studio: "Medical", wicc: ["sepsis", "diagnostics"] },
  { name: "The Resus Room", studio: "Medical", wicc: ["diagnostics"] },
  { name: "Abdominal Anatomy", studio: "Medical", wicc: ["none"] },
  { name: "Organ Donation in the ICU", studio: "Medical", wicc: ["sepsis"] },
  { name: "Vital Signs", studio: "Medical", wicc: ["diagnostics"] },
  { name: "Simplified Guide to Seizures", studio: "Medical", wicc: ["sepsis"] },
  { name: "Postpartum Hemorrhage", studio: "Medical", wicc: ["none"] },
  { name: "Exploring Evidence (DOSE-VF, NRP-NPPV, PRE-OXY)", studio: "Medical", wicc: ["diagnostics"] },
  { name: "Preterm Labor", studio: "Medical", wicc: ["none"] },
  { name: "Cord Prolapse", studio: "Medical", wicc: ["none"] },
  { name: "Placental Abruption", studio: "Medical", wicc: ["none"] },
  { name: "Placenta Previa", studio: "Medical", wicc: ["none"] },
  { name: "Signal Through Noise", studio: "Medical", wicc: ["diagnostics"] },
  { name: "EMT RX Pharmacology and Your First Prescription", studio: "Medical", wicc: ["pharmacology"] },
  { name: "NoBull Gas Laws #1", studio: "Medical", wicc: ["respiratory"] },
  { name: "NoBull Gas Laws #2", studio: "Medical", wicc: ["respiratory"] },

  { name: "The Adrenal Crisis", studio: "Medical", wicc: ["sepsis"] },
  { name: "Medical Podcasts", studio: "Medical", wicc: ["none"] },
  { name: "The Road to Psychiatric Emergencies", studio: "Medical", wicc: ["none"] },
  { name: "Benzodiazepines", studio: "Medical", wicc: ["pharmacology"] },

  // Pediatrics
  { name: "Pediatric Trauma: Accidental and Non-Accidental", studio: "Pediatrics", wicc: ["none"] },

  // Operations
  { name: "Vital Signs: Sexual Assault Awareness", studio: "Operations", wicc: ["none"] },

  { name: "Flight Ops: Scene, Mass Casualty & Disaster Response", studio: "Operations", wicc: ["none"] },
  { name: "Ketamine Assisted Psychotherapy", studio: "Operations", wicc: ["pharmacology"] },

  // Critical Care
  { name: "Out of Body: Introduction to ECMO", studio: "Critical Care", wicc: ["cardiovascular"] },

  { name: "Bedside Guide to Vasopressors", studio: "Critical Care", wicc: ["pharmacology"] },
  { name: "Causes of Hypoxemia", studio: "Critical Care", wicc: ["respiratory"] },
  { name: "Flow and Triggering", studio: "Critical Care", wicc: ["respiratory"] },
  { name: "Ventilator Language", studio: "Critical Care", wicc: ["respiratory"] },
  { name: "T1 Vent Hacks", studio: "Critical Care", wicc: ["respiratory"] },
  { name: "Dissecting Goals", studio: "Critical Care", wicc: ["sepsis"] },
  { name: "External Ventricular Drains", studio: "Critical Care", wicc: ["vascular", "diagnostics"] },
  { name: "iHeart Perfusion", studio: "Critical Care", wicc: ["cardiovascular"] },
  { name: "Tricky Tracings: Advanced Arterial Lines", studio: "Critical Care", wicc: ["diagnostics"] },
  { name: "Subarachnoid & The EVD", studio: "Critical Care", wicc: ["diagnostics"] },
  { name: "Puzzle", studio: "Critical Care", wicc: ["none"] },
  { name: "Lab Values", studio: "Critical Care", wicc: ["diagnostics"] },
  { name: "12 Hour Mechanical Ventilation Course", studio: "Critical Care", wicc: ["respiratory"] },
  { name: "Lab Panel Cold Reads", studio: "Critical Care", wicc: ["diagnostics"] },
  { name: "Pulmonary Vasodilators", studio: "Critical Care", wicc: ["pharmacology"] },
  { name: "Art Line Anatomy", studio: "Critical Care", wicc: ["diagnostics", "vascular"] },
  { name: "FEARLESS: Analgesia, Sedation and Induction", studio: "Critical Care", wicc: ["pharmacology"] },
  { name: "Crashing MAP: Search for Blood", studio: "Critical Care", wicc: ["diagnostics"] },
  { name: "CVP", studio: "Critical Care", wicc: ["vascular", "diagnostics"] },
  { name: "The Pulmonary Artery Catheter", studio: "Critical Care", wicc: ["vascular", "diagnostics"] },
  { name: "Cardiac Arrest Ultrasound", studio: "Critical Care", wicc: ["cardiovascular", "diagnostics"] },
  { name: "IABP", studio: "Critical Care", wicc: ["vascular", "cardiovascular"] },
  { name: "Arterial Line: Placement in Critical Care Transport", studio: "Critical Care", wicc: ["vascular"] },
  { name: "FEARLESS: Pediatric Mechanical Ventilation", studio: "Critical Care", wicc: ["respiratory"] },
  { name: "Infusion Crimes", studio: "Critical Care", wicc: ["vascular", "pharmacology"] }
];

// Deduplicate
const seen = new Set();
const UNIQUE = COURSES.filter(c => { if (seen.has(c.name)) return false; seen.add(c.name); return true; });

let filterCat = "all";

function shortName(key) {
  return CATEGORIES[key].name.split(":")[0].split(",")[0];
}

function buildPills() {
  const el = document.getElementById("pills");
  const counts = {};
  Object.keys(CATEGORIES).forEach(k => counts[k] = 0);
  UNIQUE.forEach(c => c.wicc.forEach(w => counts[w]++));

  let html = `<button class="pill" onclick="setFilter('all')" id="pill-all" style="background:${filterCat==='all'?'#f8fafc':'#334155'};color:${filterCat==='all'?'#0f172a':'#94a3b8'}">All (${UNIQUE.length})</button>`;
  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    if (key === "none") return;
    const active = filterCat === key;
    html += `<button class="pill" onclick="setFilter('${key}')" id="pill-${key}" style="background:${active?cat.color:'#334155'};color:${active?'#fff':'#94a3b8'}">${shortName(key)} (${counts[key]})</button>`;
  });
  const noneActive = filterCat === "none";
  html += `<button class="pill" onclick="setFilter('none')" id="pill-none" style="background:${noneActive?'#6b7280':'#334155'};color:${noneActive?'#fff':'#94a3b8'}">No match (${counts.none})</button>`;
  el.innerHTML = html;
}

function setFilter(cat) {
  filterCat = (filterCat === cat) ? "all" : cat;
  render();
}

function render() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  let filtered = UNIQUE;
  if (q) filtered = filtered.filter(c => c.name.toLowerCase().includes(q) || c.studio.toLowerCase().includes(q));
  if (filterCat !== "all") filtered = filtered.filter(c => c.wicc.includes(filterCat));
  filtered.sort((a, b) => a.name.localeCompare(b.name));

  buildPills();
  document.getElementById("count").textContent = `${filtered.length} course${filtered.length !== 1 ? 's' : ''} found`;

  const el = document.getElementById("results");
  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">\u{1F50D}</div><div style="font-size:15px">No courses match your search</div><div style="font-size:13px;margin-top:4px">Try a different keyword</div></div>`;
    return;
  }

  el.innerHTML = filtered.map(c => {
    const borderColor = CATEGORIES[c.wicc[0]].color;
    const tags = c.wicc.map(w => {
      const cat = CATEGORIES[w];
      return `<span class="tag" style="background:${cat.color}22;color:${cat.color};border:1px solid ${cat.color}44">${shortName(w)}${w !== 'none' ? ' (' + cat.hours + ' hrs)' : ''}</span>`;
    }).join("");
    return `<div class="card" style="border-left-color:${borderColor}"><div class="card-title">${esc(c.name)}</div><div class="card-studio">Studio: ${esc(c.studio)}</div><div class="tags">${tags}</div></div>`;
  }).join("");
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

render();
</script>
</body>
</html>
